title: Mnemo Docs
description: Public documentation hub for Mnemo, including user guides, project status, and issue reporting entrypoints.
baseurl: ""
url: "https://docs.hellomnemo.com"

remote_theme: just-the-docs/just-the-docs

color_scheme: light
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: case_insensitive

aux_links:
  "Main site":
    - "https://hellomnemo.com"
  "Report an issue":
    - "https://github.com/greenmice-technologies/hellomnemo.com/issues"

aux_links_new_tab: true

footer_content: "&copy; 2026 Mnemo. Public docs and project updates."

back_to_top: true
back_to_top_text: "Back to top"

heading_anchors: true

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
