name: Documentation improvement
description: Report a missing, unclear, or incorrect part of the docs.
title: "[Docs]: "
labels:
- documentation
body:
- type: input
  id: page
  attributes:
    label: Page or URL
    placeholder: https://docs.hellomnemo.com/
  validations:
    required: true
- type: textarea
  id: issue
  attributes:
    label: What is wrong or missing?
  validations:
    required: true
- type: textarea
  id: suggestion
  attributes:
    label: Suggested fix
